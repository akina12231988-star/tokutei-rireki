<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>特定技能外国人の履歴書</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans JP', sans-serif; background:#f0f4f8; min-height:100vh; }

#lang-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:40px 20px; background:linear-gradient(135deg,#1a3a5c 0%,#2d6a9f 100%); }
#lang-screen h1 { color:#fff; font-size:20px; font-weight:700; letter-spacing:.1em; margin-bottom:6px; text-align:center; }
#lang-screen p { color:rgba(255,255,255,.7); font-size:13px; margin-bottom:36px; text-align:center; }
.lang-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; width:100%; max-width:460px; }
.lang-btn { background:#fff; border:none; border-radius:12px; padding:22px 14px; cursor:pointer; text-align:center; transition:transform .15s; box-shadow:0 4px 14px rgba(0,0,0,.15); }
.lang-btn:active { transform:scale(.97); }
.lang-btn .flag { font-size:30px; display:block; margin-bottom:6px; }
.lang-btn .ln { font-size:13px; font-weight:700; color:#1a3a5c; display:block; }
.lang-btn .ls { font-size:11px; color:#888; display:block; margin-top:2px; }

#form-screen { display:none; padding:16px; max-width:860px; margin:0 auto; }
.fhdr { background:#1a3a5c; color:#fff; padding:16px 20px; border-radius:12px 12px 0 0; display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; }
.fhdr h2 { font-size:15px; }
.back-btn { background:rgba(255,255,255,.2); color:#fff; border:none; border-radius:7px; padding:7px 12px; font-size:12px; cursor:pointer; }
/* ⑨ 表示モード切替（スマホ／PC） */
.view-toggle { display:flex; gap:0; background:rgba(255,255,255,.15); border-radius:8px; padding:3px; }
.view-toggle button { background:transparent; color:rgba(255,255,255,.75); border:none; border-radius:6px; padding:6px 10px; font-size:11px; font-weight:700; cursor:pointer; font-family:'Noto Sans JP',sans-serif; white-space:nowrap; }
.view-toggle button.active { background:#fff; color:#1a3a5c; }
.fbody { background:#fff; border-radius:0 0 12px 12px; padding:22px; box-shadow:0 4px 18px rgba(0,0,0,.1); }
.sec { font-size:13px; font-weight:700; color:#1a3a5c; border-left:4px solid #2d6a9f; padding-left:8px; margin:24px 0 12px; }
.fg { display:grid; gap:11px; }
.c2 { grid-template-columns:1fr 1fr; }
.c3 { grid-template-columns:1fr 1fr 1fr; }
.field label { display:block; font-size:11px; font-weight:600; color:#555; margin-bottom:3px; }
.field input,.field select,.field textarea { width:100%; border:1.5px solid #d0dbe8; border-radius:7px; padding:9px 10px; font-size:15px; font-family:'Noto Sans JP',sans-serif; color:#111; background:#f8fafc; }
.field input:focus,.field select:focus { outline:none; border-color:#2d6a9f; background:#fff; }
.field textarea { resize:vertical; min-height:60px; }
.photo-wrap { width:110px; height:140px; border:2px dashed #2d6a9f; border-radius:8px; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; background:#f0f6ff; overflow:hidden; flex-shrink:0; }
.photo-wrap img { width:100%; height:100%; object-fit:cover; }
.photo-hint { font-size:11px; color:#2d6a9f; text-align:center; padding:8px; white-space:pre-line; line-height:1.6; }
#photo-input { display:none; }
.rg { display:flex; gap:12px; flex-wrap:wrap; padding:3px 0; }
.rg label { display:flex; align-items:center; gap:5px; font-size:14px; cursor:pointer; color:#333; }
.rg input[type=radio] { width:14px; height:14px; accent-color:#2d6a9f; }
.dyn-rows { display:flex; flex-direction:column; gap:8px; margin-bottom:8px; }
.drow { display:grid; gap:6px; align-items:end; background:#f8fafc; padding:8px; border-radius:8px; border:1px solid #e0eaf4; }
.career-drow { grid-template-columns:70px 42px 70px 42px 1fr 1.2fr 26px; }
.family-drow { grid-template-columns:80px 1fr 80px 1fr 26px; }
.drow input,.drow select { border:1.5px solid #d0dbe8; border-radius:6px; padding:7px; font-size:13px; background:#fff; width:100%; font-family:'Noto Sans JP',sans-serif; }
.drow label { font-size:10px; color:#777; display:block; margin-bottom:2px; }
.add-btn { background:#e8f0fb; color:#2d6a9f; border:1.5px dashed #2d6a9f; border-radius:7px; padding:9px; width:100%; cursor:pointer; font-size:12px; font-weight:600; }
.del-btn { background:#fee; color:#c00; border:none; border-radius:5px; width:24px; height:24px; cursor:pointer; font-size:14px; align-self:end; }
.sub-area { margin-top:24px; display:flex; gap:10px; flex-wrap:wrap; }
.btn-main { flex:1; min-width:200px; background:#1a3a5c; color:#fff; border:none; border-radius:9px; padding:16px; font-size:14px; font-weight:700; cursor:pointer; font-family:'Noto Sans JP',sans-serif; line-height:1.4; }
.btn-main:active { background:#2d6a9f; }
.btn-sub { background:#e8f0fb; color:#1a3a5c; border:none; border-radius:9px; padding:14px 18px; font-size:13px; font-weight:700; cursor:pointer; font-family:'Noto Sans JP',sans-serif; }

#overlay { display:none; position:fixed; inset:0; background:rgba(20,40,70,.85); z-index:9999; flex-direction:column; align-items:center; justify-content:center; color:#fff; gap:18px; text-align:center; padding:30px; }
#overlay.show { display:flex; }
.spinner { width:46px; height:46px; border:4px solid rgba(255,255,255,.3); border-top-color:#fff; border-radius:50%; animation:spin .8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
#overlay-msg { font-size:16px; font-family:'Noto Sans JP',sans-serif; line-height:1.6; }

/* PDF保存案内モーダル */
#pdf-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:9998; align-items:center; justify-content:center; padding:20px; }
#pdf-modal.show { display:flex; }
.modal-box { background:#fff; border-radius:16px; padding:28px 24px; max-width:400px; width:100%; text-align:center; }
.modal-box h3 { font-size:17px; color:#1a3a5c; margin-bottom:12px; }
.modal-box p { font-size:13px; color:#555; line-height:1.7; margin-bottom:20px; white-space:pre-line; }
.modal-steps { background:#f0f6ff; border-radius:10px; padding:16px; margin-bottom:20px; text-align:left; }
.modal-steps li { font-size:13px; color:#333; margin-bottom:8px; padding-left:4px; }
.modal-steps li:last-child { margin-bottom:0; }
.modal-btn { width:100%; background:#1a3a5c; color:#fff; border:none; border-radius:9px; padding:14px; font-size:15px; font-weight:700; cursor:pointer; font-family:'Noto Sans JP',sans-serif; margin-bottom:10px; }
.modal-close { background:none; border:none; color:#888; font-size:13px; cursor:pointer; font-family:'Noto Sans JP',sans-serif; }
.modal-note { font-size:11px; color:#c0392b; margin-top:-8px; margin-bottom:14px; line-height:1.6; }

/* レスポンシブ（自動） */
@media(max-width:600px){
  .c2,.c3{grid-template-columns:1fr;}
  .career-drow{grid-template-columns:1fr 1fr;}
  .family-drow{grid-template-columns:1fr 1fr;}
}
/* ⑨ 強制スマホ表示（画面幅に関わらずスマホレイアウト固定） */
body.force-mobile #form-screen{max-width:480px;}
body.force-mobile .c2,body.force-mobile .c3{grid-template-columns:1fr;}
body.force-mobile .career-drow{grid-template-columns:1fr 1fr;}
body.force-mobile .family-drow{grid-template-columns:1fr 1fr;}
/* ⑨ 強制PC表示（狭い画面でも横スクロールでPCレイアウト固定） */
body.force-pc #form-screen{max-width:860px;}
body.force-pc .c2{grid-template-columns:1fr 1fr;}
body.force-pc .c3{grid-template-columns:1fr 1fr 1fr;}
body.force-pc .career-drow{grid-template-columns:70px 42px 70px 42px 1fr 1.2fr 26px;}
body.force-pc .family-drow{grid-template-columns:80px 1fr 80px 1fr 26px;}
body.force-pc{min-width:900px;}
</style>
</head>
<body>

<div id="overlay"><div class="spinner"></div><div id="overlay-msg">AIが翻訳中です...</div></div>

<!-- PDF保存案内モーダル -->
<div id="pdf-modal">
  <div class="modal-box">
    <h3>📄 PDF保存の方法</h3>
    <p id="modal-desc">履歴書の準備ができました。次の手順でPDFに保存してください。</p>
    <p class="modal-note" id="modal-note"></p>
    <div class="modal-steps">
      <ol id="modal-steps-list">
        <li>「PDFを開く」ボタンを押す</li>
        <li>画面右上の「共有」ボタンをタップ</li>
        <li>「ファイルに保存」または「PDFに保存」を選択</li>
      </ol>
    </div>
    <button class="modal-btn" id="modal-open-btn" onclick="openPdfWindow()">📄 PDFを開く</button>
    <button class="modal-close" onclick="document.getElementById('pdf-modal').classList.remove('show')">閉じる</button>
  </div>
</div>

<!-- 言語選択 -->
<div id="lang-screen">
  <h1>特定技能外国人の履歴書</h1>
  <p>言語を選択 / Pilih Bahasa / Chọn ngôn ngữ</p>
  <div class="lang-grid">
    <button class="lang-btn" onclick="selectLang('ja')"><span class="flag">🇯🇵</span><span class="ln">日本語</span><span class="ls">Japanese</span></button>
    <button class="lang-btn" onclick="selectLang('id')"><span class="flag">🇮🇩</span><span class="ln">Bahasa Indonesia</span><span class="ls">Indonesian</span></button>
    <button class="lang-btn" onclick="selectLang('vi')"><span class="flag">🇻🇳</span><span class="ln">Tiếng Việt</span><span class="ls">Vietnamese</span></button>
    <button class="lang-btn" onclick="selectLang('km')"><span class="flag">🇰🇭</span><span class="ln">ភាសាខ្មែរ</span><span class="ls">Khmer</span></button>
    <button class="lang-btn" onclick="selectLang('tl')"><span class="flag">🇵🇭</span><span class="ln">Filipino</span><span class="ls">Tagalog</span></button>
    <button class="lang-btn" onclick="selectLang('en')"><span class="flag">🌐</span><span class="ln">English</span><span class="ls">英語</span></button>
  </div>
</div>

<!-- 入力フォーム -->
<div id="form-screen">
  <div style="max-width:860px;margin:20px auto;">
    <div class="fhdr">
      <h2 id="ft">特定技能外国人の履歴書</h2>
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="view-toggle" id="view-toggle">
          <button data-view="auto" onclick="setView('auto')" id="vb-auto">自動</button>
          <button data-view="mobile" onclick="setView('mobile')" id="vb-mobile">📱</button>
          <button data-view="pc" onclick="setView('pc')" id="vb-pc">💻</button>
        </div>
        <button class="back-btn" onclick="goBack()">← <span id="lb-back">戻る</span></button>
      </div>
    </div>
    <div class="fbody">
      <div class="sec" id="lb-s1">① 基本情報</div>
      <div style="display:flex;gap:18px;align-items:flex-start;">
        <div>
          <label style="font-size:11px;color:#555;display:block;margin-bottom:4px;" id="lb-photo">顔写真</label>
          <div class="photo-wrap" onclick="document.getElementById('photo-input').click()">
            <img id="photo-prev" src="" style="display:none">
            <div class="photo-hint" id="photo-hint">📷
タップして
写真を追加</div>
          </div>
          <input type="file" id="photo-input" accept="image/*" onchange="prevPhoto(event)">
        </div>
        <div style="flex:1">
          <div class="fg c2" style="margin-bottom:10px;">
            <div class="field"><label id="lb-kana">フリガナ（カタカナ）</label><input type="text" id="f-kana" placeholder="ヴォン　ヴァン　タァン"></div>
            <div class="field"><label id="lb-gender">② 性別</label>
              <div class="rg"><label><input type="radio" name="gender" value="男性"><span id="lb-male">男性</span></label><label><input type="radio" name="gender" value="女性"><span id="lb-female">女性</span></label></div>
            </div>
          </div>
          <div class="fg c2">
            <div class="field"><label id="lb-name">① 氏名（英字）</label><input type="text" id="f-name" placeholder="VUONG VAN THANH"></div>
            <div class="field"><label id="lb-dob">③ 生年月日</label><input type="date" id="f-dob"></div>
          </div>
        </div>
      </div>
      <div class="fg c3" style="margin-top:13px;">
        <div class="field"><label id="lb-nat">④ 国籍・地域</label><input type="text" id="f-nat"></div>
        <div class="field"><label id="lb-lang">⑤ 理解できる言語</label><input type="text" id="f-lang"></div>
        <div class="field"><label id="lb-spouse">⑥ 配偶者</label>
          <div class="rg"><label><input type="radio" name="spouse" value="有"><span id="lb-yes">有</span></label><label><input type="radio" name="spouse" value="無"><span id="lb-no">無</span></label></div>
        </div>
      </div>
      <div class="fg c2" style="margin-top:12px;">
        <div class="field"><label id="lb-jtype">⑦ 実習の職種</label><input type="text" id="f-jtype"></div>
        <div class="field"><label id="lb-jwork">⑧ 実習の作業名</label><input type="text" id="f-jwork"></div>
      </div>
      <div class="fg c2" style="margin-top:12px;">
        <div class="field"><label id="lb-tend">実習修了日</label><input type="date" id="f-tend"></div>
        <div class="field"><label id="lb-vexp">ビザの期限</label><input type="date" id="f-vexp"></div>
      </div>
      <div class="fg c2" style="margin-top:12px;">
        <div class="field"><label id="lb-status">現在の在留資格</label><input type="text" id="f-status"></div>
        <div class="field"><label id="lb-adjp">日本での住居地</label><input type="text" id="f-adjp"></div>
      </div>
      <div class="field" style="margin-top:12px;"><label id="lb-adhm">本国の住居地</label><input type="text" id="f-adhm"></div>

      <div class="sec" id="lb-s2">⑨ 職歴</div>
      <div class="dyn-rows" id="career-rows"></div>
      <button class="add-btn" onclick="addCareer()" id="lb-add-c">＋ 行を追加</button>

      <div class="sec" id="lb-s3">⑩ 資格・免許</div>
      <div class="field"><textarea id="f-lic" rows="2" placeholder="専門級、技能実習終了証明書 など"></textarea></div>

      <div class="sec" id="lb-s4">体の状態</div>
      <div class="fg c3">
        <div class="field"><label id="lb-ht">身長 (cm)</label><input type="number" id="f-ht"></div>
        <div class="field"><label id="lb-wt">体重 (kg)</label><input type="number" id="f-wt"></div>
        <div class="field"><label id="lb-bl">血液型</label>
          <select id="f-bl"><option value="">--</option><option>A型</option><option>B型</option><option>O型</option><option>AB型</option></select>
        </div>
      </div>
      <div class="fg c2" style="margin-top:11px;">
        <div class="field"><label id="lb-ill">病気</label><input type="text" id="f-ill"></div>
        <div class="field"><label id="lb-vis">視力（右/左）</label><input type="text" id="f-vis" placeholder="1.0 / 1.0"></div>
      </div>
      <div class="fg c2" style="margin-top:11px;">
        <div class="field"><label id="lb-hand">利き手</label>
          <div class="rg"><label><input type="radio" name="hand" value="右"><span id="lb-right">右</span></label><label><input type="radio" name="hand" value="左"><span id="lb-left">左</span></label></div>
        </div>
        <div class="field"><label id="lb-hob">趣味</label><input type="text" id="f-hob"></div>
      </div>
      <div class="fg c2" style="margin-top:11px;">
        <div class="field"><label id="lb-drink">飲酒</label>
          <div class="rg"><label><input type="radio" name="drink" value="無"><span id="lb-nd">無</span></label><label><input type="radio" name="drink" value="時々"><span id="lb-st">時々</span></label><label><input type="radio" name="drink" value="沢山"><span id="lb-al">沢山</span></label></div>
        </div>
        <div class="field"><label id="lb-smoke">タバコ</label>
          <div class="rg"><label><input type="radio" name="smoke" value="無"><span id="lb-ns">無</span></label><label><input type="radio" name="smoke" value="時々"><span id="lb-ss">時々</span></label><label><input type="radio" name="smoke" value="沢山"><span id="lb-as">沢山</span></label></div>
        </div>
      </div>

      <div class="sec" id="lb-s5">家族構成</div>
      <div class="dyn-rows" id="family-rows"></div>
      <button class="add-btn" onclick="addFamily()" id="lb-add-f">＋ 行を追加</button>

      <div class="sub-area">
        <button class="btn-sub" onclick="previewDirect()" id="lb-prev">📄 プレビュー</button>
        <button class="btn-main" onclick="translateAndShowPDF()" id="lb-pdf">🌐 日本語に翻訳して<br>PDF保存</button>
      </div>
    </div>
  </div>
</div>

<script>
/* =========================================================================
 * 特定技能外国人 履歴書システム
 * ⑬ 共通化: 翻訳辞書(T) / 在留資格辞書(RESIDENCE) / 入力項目 / PDFテンプレート
 * ========================================================================= */

/* ---- ⑥ 翻訳バックエンド設定 -----------------------------------------------
 * ブラウザから直接 Claude API を呼ぶ構成は廃止（APIキー露出・CORSで不可）。
 * 自由記述項目のみ、下記の安全なバックエンド(/api/translate)経由で翻訳する。
 * 未設定(空文字)の場合は辞書変換のみで動作し、自由記述は入力言語のまま残す
 * （＝バックエンドが無くてもPDF生成フローは必ず最後まで完了する）。
 * デプロイ済み外国人管理システムのURLを設定すると自動翻訳が有効になる。 */
const TRANSLATE_ENDPOINT = ''; // 例: 'https://<your-app>.vercel.app/api/translate'

/* ---- ⑬ 翻訳辞書（UI文言） ------------------------------------------------ */
const T = {
  ja:{title:'特定技能外国人の履歴書',back:'戻る',back2:'編集に戻る',s1:'① 基本情報',s2:'⑨ 職歴',s3:'⑩ 資格・免許',s4:'体の状態',s5:'家族構成',photo:'顔写真',photoHint:'📷\nタップして\n写真を追加',kana:'フリガナ（カタカナ）',name:'① 氏名（英字）',gender:'② 性別',male:'男性',female:'女性',dob:'③ 生年月日',nat:'④ 国籍・地域',lang:'⑤ 理解できる言語',spouse:'⑥ 配偶者',yes:'有',no:'無',jtype:'⑦ 実習の職種',jwork:'⑧ 実習の作業名',tend:'実習修了日',vexp:'ビザの期限',status:'現在の在留資格',adjp:'日本での住居地',adhm:'本国の住居地',addC:'＋ 行を追加',addF:'＋ 行を追加',ht:'身長 (cm)',wt:'体重 (kg)',bl:'血液型',ill:'病気',vis:'視力（右/左）',hand:'利き手',right:'右',left:'左',hob:'趣味',drink:'飲酒',smoke:'タバコ',nd:'無',st:'時々',al:'沢山',ns:'無',ss:'時々',as:'沢山',prev:'📄 プレビュー',pdf:'🌐 日本語に翻訳してPDF保存',cfrom:'開始年',cfromm:'月',cto:'終了年',ctom:'月',ccomp:'会社名',cstat:'当時の在留資格',cstatPlaceholder:'選択してください',frel:'続柄',fname:'氏名',fage:'年齢',fjob:'仕事',overlayMsg:'AIが翻訳中です...',

const RESIDENCE_BY_KEY = Object.fromEntries(RESIDENCE.map(r=>[r.key,r]));
function residenceOptionsHTML(lang, selectedKey){
  const t=T[lang]||T.ja;
  let html=`<option value="">${t.cstatPlaceholder}</option>`;
  for(const r of RESIDENCE){
    const label=r[lang]||r.ja;
    html+=`<option value="${r.key}"${r.key===selectedKey?' selected':''}>${label}</option>`;
  }
  return html;
}
function residenceJa(key){ return key && RESIDENCE_BY_KEY[key] ? RESIDENCE_BY_KEY[key].ja : ''; }

/* ② 既存の職歴・家族の行ラベルとプルダウン表示を選択言語で貼り直す */
function relabelDynamicRows(){
  const t=T[currentLang]||T.ja;
  document.querySelectorAll('#career-rows .career-drow').forEach(row=>{
    const labels=row.querySelectorAll('label');
    const txt=[t.cfrom,t.cfromm,t.cto,t.ctom,t.ccomp,t.cstat];
    labels.forEach((lb,i)=>{ if(txt[i]!==undefined) lb.textContent=txt[i]; });
    const sel=row.querySelector('select.career-stat');
    if(sel){ const cur=sel.value; sel.innerHTML=residenceOptionsHTML(currentLang,cur); }
  });
  document.querySelectorAll('#family-rows .family-drow').forEach(row=>{
    const labels=row.querySelectorAll('label');
    const txt=[t.frel,t.fname,t.fage,t.fjob];
    labels.forEach((lb,i)=>{ if(txt[i]!==undefined) lb.textContent=txt[i]; });
  });
}
function goBack(){

  document.getElementById('lang-screen').style.display='flex';
}

/* ---- ⑨ 表示モード切替（スマホ／PC／自動） -------------------------------- */
function setView(mode){
  document.body.classList.remove('force-mobile','force-pc');
  if(mode==='mobile')document.body.classList.add('force-mobile');
  else if(mode==='pc')document.body.classList.add('force-pc');
  document.querySelectorAll('#view-toggle button').forEach(b=>{
    b.classList.toggle('active', b.dataset.view===mode);
  });
  try{ localStorage.setItem('rirekiView',mode); }catch(e){}
}
(function initView(){
  let mode='auto';
  try{ mode=localStorage.getItem('rirekiView')||'auto'; }catch(e){}
  document.addEventListener('DOMContentLoaded',()=>setView(mode));
})();

/* ---- 写真 ---------------------------------------------------------------- */
function prevPhoto(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{
    photoDataUrl=ev.target.result;
    const img=document.getElementById('photo-prev');
    img.src=photoDataUrl;img.style.display='block';
    document.getElementById('photo-hint').style.display='none';
  };
  r.readAsDataURL(file);
}

function addCareer(){

  d.className='drow career-drow';d.id=`cr-${id}`;
  d.innerHTML=`<div><label>${t.cfrom}</label><input type="number" class="c-fy" placeholder="2022"></div>`+
    `<div><label>${t.cfromm}</label><input type="number" class="c-fm" min="1" max="12" placeholder="4"></div>`+
    `<div><label>${t.cto}</label><input type="number" class="c-ty" placeholder="2025"></div>`+
    `<div><label>${t.ctom}</label><input type="number" class="c-tm" min="1" max="12" placeholder="3"></div>`+
    `<div><label>${t.ccomp}</label><input type="text" class="c-comp"></div>`+
    `<div><label>${t.cstat}</label><select class="career-stat">${residenceOptionsHTML(currentLang,'')}</select></div>`+
    `<button class="del-btn" onclick="document.getElementById('cr-${id}').remove()">×</button>`;
  document.getElementById('career-rows').appendChild(d);
}

  d.className='drow family-drow';d.id=`fr-${id}`;
  d.innerHTML=`<div><label>${t.frel}</label><input type="text" class="f-rel"></div>`+
    `<div><label>${t.fname}</label><input type="text" class="f-nm"></div>`+
    `<div><label>${t.fage}</label><input type="number" class="f-age" placeholder="1965"></div>`+
    `<div><label>${t.fjob}</label><input type="text" class="f-job"></div>`+
    `<button class="del-btn" onclick="document.getElementById('fr-${id}').remove()">×</button>`;
  document.getElementById('family-rows').appendChild(d);
}

/* ---- 入力収集 ------------------------------------------------------------ */

  const gv=n=>{const e=document.querySelector(`input[name="${n}"]:checked`);return e?e.value:'';};
  const v=id=>document.getElementById(id)?.value||'';
  const careers=[];
  document.querySelectorAll('#career-rows .career-drow').forEach(row=>{
    careers.push({
      fy:row.querySelector('.c-fy')?.value||'',

      ty:row.querySelector('.c-ty')?.value||'',
      tm:row.querySelector('.c-tm')?.value||'',

    });

}

/* ---- ⑤⑥ 日本語化（辞書変換＋任意のバックエンド翻訳） --------------------
 * 選択式項目（性別/配偶者/利き手/飲酒/タバコ/在留資格）は value が日本語コード
 * なので辞書で確定変換 → API不要。自由記述のみ任意でバックエンド翻訳する。
 * どの段階で失敗してもデータはそのまま返し、フロー全体は必ず完了する。 */
const FREE_TEXT_KEYS=['nat','lang','jtype','jwork','status','adjp','adhm','lic','ill','hob'];
async function translateFields(data, fromLang){
  // 在留資格コード → 日本語（PDFは必ず日本語）
  data.careers=data.careers.map(c=>({...c, statJa:residenceJa(c.statKey)}));
  data._translateNote='';
  if(fromLang==='ja') return data;              // 日本語入力はそのまま
  if(!TRANSLATE_ENDPOINT){                        // バックエンド未設定 → 辞書のみ
    data._translateNote='自由記述欄は入力言語のまま出力されます（自動翻訳バックエンド未設定）。';
    return data;
  }
  const ln={id:'インドネシア語',vi:'ベトナム語',km:'クメール語',tl:'タガログ語',en:'英語'};
  const texts={};
  for(const k of FREE_TEXT_KEYS){ if(data[k]) texts[k]=data[k]; }
  data.careers.forEach((c,i)=>{ if(c.comp) texts['cc'+i]=c.comp; });
  data.families.forEach((f,i)=>{ if(f.rel) texts['fr'+i]=f.rel; if(f.name) texts['fn'+i]=f.name; if(f.job) texts['fj'+i]=f.job; });
  if(Object.keys(texts).length===0) return data;
  try{
    const ctrl=new AbortController();
    const timer=setTimeout(()=>ctrl.abort(),25000);   // タイムアウト処理
    const res=await fetch(TRANSLATE_ENDPOINT,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({from:ln[fromLang]||fromLang, texts}),
      signal:ctrl.signal
    });
    clearTimeout(timer);
    if(!res.ok) throw new Error('APIエラー: HTTP '+res.status);
    const out=await res.json();                        // JSON解析エラーはcatchへ
    const tr=(out&&out.translations)||{};
    const g=(k,fb)=>tr[k]!=null&&tr[k]!==''?tr[k]:fb;
    for(const k of FREE_TEXT_KEYS){ if(data[k]) data[k]=g(k,data[k]); }
    data.careers=data.careers.map((c,i)=>({...c, comp:g('cc'+i,c.comp)}));
    data.families=data.families.map((f,i)=>({...f, rel:g('fr'+i,f.rel), name:g('fn'+i,f.name), job:g('fj'+i,f.job)}));
  }catch(e){
    // 翻訳失敗でもPDFは必ず出す（自由記述は入力言語のまま）
    data._translateNote='自動翻訳に接続できなかったため、自由記述欄は入力言語のまま出力しました。';
  }
  return data;
}

/* ---- 日付整形 ------------------------------------------------------------ */
function fmtDate(s){if(!s)return'';const d=new Date(s);if(isNaN(d))return s;return`${d.getFullYear()}年 ${d.getMonth()+1}月 ${d.getDate()}日`;}

/* ---- ⑩⑪⑫ 共通データフォーマット（PDFへ埋め込む機械可読ペイロード） ------
 * PDFテキスト層に見えない白文字で埋め込む。外国人管理システムはこれを読み取る。
 * docType を変えれば履歴書以外の帳票にも再利用できる。 */
function buildPayload(data){
  return {
    docType:'resume',
    schema:'tokutei-rireki',
    version:1,
    generatedAt:new Date().toISOString(),
    sourceLang:currentLang,
    basic:{
      name:data.name, kana:data.kana, gender:data.gender, birth:data.dob,
      nationality:data.nat, languages:data.lang, spouse:data.spouse,
      trainingType:data.jtype, trainingWork:data.jwork,
      trainingEnd:data.tend, visaExpiry:data.vexp,
      residenceStatus:data.status, addressJapan:data.adjp, addressHome:data.adhm,
      qualifications:data.lic,
      height:data.ht, weight:data.wt, bloodType:data.bl, illness:data.ill,
      vision:data.vis, dominantHand:data.hand, hobby:data.hob,
      drinking:data.drink, smoking:data.smoke
    },
    careers:data.careers.filter(c=>c.comp||c.fy||c.statJa).map(c=>({
      startYear:c.fy, startMonth:c.fm, endYear:c.ty, endMonth:c.tm,
      company:c.comp, residenceStatusKey:c.statKey, residenceStatus:c.statJa||''
    })),
    families:data.families.filter(f=>f.name||f.rel).map(f=>({
      relation:f.rel, name:f.name, birthYear:f.age, job:f.job
    }))
  };
}
function encodePayload(payload){
  const json=JSON.stringify(payload);
  return btoa(unescape(encodeURIComponent(json)));   // UTF-8安全なBase64
}

function buildResumeHTML(data){
  const cRows=data.careers.filter(c=>c.comp||c.fy).map(c=>`<tr><td style="text-align:center;">${c.fy}</td><td style="text-align:center;">${c.fm}</td><td style="text-align:center;">${c.ty}</td><td style="text-align:center;">${c.tm}</td><td>${c.comp}</td><td style="text-align:center;">${c.statJa||''}</td></tr>`).join('')||'<tr><td colspan="6" style="height:26px;"></td></tr>';
  const fRows=data.families.filter(f=>f.name||f.rel).map(f=>`<tr><td style="text-align:center;">${f.rel}</td><td>${f.name}</td><td style="text-align:center;">${f.age?f.age+'年':''}</td><td>${f.job}</td></tr>`).join('')||'<tr><td colspan="4" style="height:26px;"></td></tr>';

  const vis=data.vis?data.vis.split('/'):['',''];
  const cLen=Math.max(data.careers.filter(c=>c.comp||c.fy).length,1);
  const fLen=Math.max(data.families.filter(f=>f.name||f.rel).length,1);
  const payloadB64=encodePayload(buildPayload(data));
  return`<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>${data.name||'履歴書'} 履歴書</title><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet"><style>*{box-sizing:border-box;margin:0;padding:0}html,body{background:#e9eef4}body{font-family:'Noto Sans JP',sans-serif;color:#0f172a;-webkit-font-smoothing:antialiased;padding:14px 10px 40px}.bar{max-width:210mm;margin:0 auto 12px;display:flex;flex-wrap:wrap;align-items:center;gap:10px}.bar button{background:#1e3a5f;color:#fff;border:none;border-radius:10px;padding:12px 18px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 4px 12px rgba(30,58,95,.25)}.bar button:active{background:#2d5580}.bar span{font-size:11px;color:#64748b}.viewport{width:100%;overflow:hidden}.page{width:210mm;min-height:297mm;background:#fff;margin:0 auto;padding:14mm;border-radius:14px;box-shadow:0 12px 40px rgba(15,23,42,.14)}.rhead{display:flex;justify-content:space-between;align-items:flex-start;gap:18px;border-bottom:3px solid #1e3a5f;padding-bottom:12px;margin-bottom:14px}.rtitle h1{font-size:21px;font-weight:700;letter-spacing:.24em;color:#1e3a5f;line-height:1.3}.rtitle p{font-size:9px;letter-spacing:.16em;color:#94a3b8;margin-top:6px}.rphoto img,.rphoto>div{border-radius:6px}table{width:100%;border-collapse:collapse}td,th{border:1px solid #cbd5e1;padding:7px 8px;vertical-align:middle;font-size:11.5px;line-height:1.55}.lc{background:#eef2f7;font-weight:700;font-size:10.5px;white-space:nowrap;text-align:center;color:#334155}.nb{display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;background:#1e3a5f;color:#fff;border-radius:50%;font-size:8px;margin-right:3px;font-weight:700}.rireki-data{color:#fff;font-size:4px;line-height:1.1;word-break:break-all;user-select:all;margin-top:6px}@media print{html,body{background:#fff}body{padding:0}.bar{display:none}.viewport{overflow:visible;height:auto!important}.page{width:auto;min-height:0;margin:0;padding:0;border-radius:0;box-shadow:none;transform:none!important}@page{size:A4 portrait;margin:12mm}}</style></head><body><div class="bar"><button onclick="window.print()">📄 PDFに保存 / 印刷</button><span>スマホは画面に合わせて全体表示・PDFはA4で保存されます</span></div><div class="viewport"><div class="page"><header class="rhead"><div class="rtitle"><h1>特定技能外国人の履歴書</h1><p>SPECIFIED SKILLED WORKER · RESUME</p></div><div class="rphoto">${photo}</div></header><table><tr><td class="lc" rowspan="2" style="width:52px;"><span class="nb">①</span>氏名</td><td class="lc" style="width:56px;">フリガナ</td><td colspan="2">${data.kana}</td><td class="lc" style="width:64px;"><span class="nb">②</span>性別</td><td colspan="2">${data.gender}</td></tr><tr><td class="lc">英字</td><td colspan="2">${data.name}</td><td class="lc"><span class="nb">③</span>生年月日</td><td colspan="2">${fmtDate(data.dob)}</td></tr><tr><td class="lc" colspan="2"><span class="nb">④</span>国籍・地域</td><td>${data.nat}</td><td class="lc"><span class="nb">⑤</span>十分に理解できる言語</td><td>${data.lang}</td><td class="lc"><span class="nb">⑥</span>配偶者の有無</td><td style="text-align:center;">${data.spouse}</td></tr><tr><td class="lc" colspan="2"><span class="nb">⑦</span>実習の職種</td><td colspan="2">${data.jtype}</td><td class="lc"><span class="nb">⑧</span>実習の作業名</td><td colspan="2">${data.jwork}</td></tr><tr><td class="lc" colspan="2">実習修了日</td><td colspan="2">${fmtDate(data.tend)}</td><td class="lc">ビザの期限</td><td colspan="2">${fmtDate(data.vexp)}</td></tr><tr><td class="lc" colspan="2">現在の在留資格</td><td colspan="5">${data.status}</td></tr><tr><td class="lc" colspan="2">日本での現在住居地</td><td colspan="5">${data.adjp}</td></tr><tr><td class="lc" colspan="2">本国の住居地</td><td colspan="5">${data.adhm}</td></tr><tr><td class="lc" rowspan="${cLen+2}"><span class="nb">⑨</span>職歴</td><th class="lc">年</th><th class="lc">月</th><th class="lc">年</th><th class="lc">月</th><th class="lc">会社名</th><th class="lc">当時の在留資格</th></tr>${cRows}<tr><td colspan="6" style="height:20px;"></td></tr><tr><td class="lc" colspan="2"><span class="nb">⑩</span>資格・免許</td><td colspan="5" style="white-space:pre-wrap;min-height:40px;">${data.lic||'　－ 専門級、技能実習終了証明書'}</td></tr><tr><td class="lc" rowspan="5">体の状態</td><td class="lc">身長</td><td>${data.ht} cm</td><td class="lc" rowspan="5">その他</td><td class="lc">利き手</td><td colspan="2">${data.hand}</td></tr><tr><td class="lc">体重</td><td>${data.wt} kg</td><td class="lc">趣味</td><td colspan="2">${data.hob}</td></tr><tr><td class="lc">血液型</td><td>${data.bl}</td><td class="lc">飲酒</td><td colspan="2">${data.drink}</td></tr><tr><td class="lc">病気</td><td>${data.ill}</td><td class="lc">タバコ</td><td colspan="2">${data.smoke}</td></tr><tr><td class="lc">視力</td><td>右:${(vis[0]||'').trim()} 左:${(vis[1]||'').trim()}</td><td colspan="3"></td></tr><tr><td class="lc" rowspan="${fLen+2}">家族構成</td><th class="lc">続柄</th><th class="lc" colspan="2">氏名</th><th class="lc">年齢</th><th class="lc" colspan="2">仕事</th></tr>${fRows}<tr><td colspan="6" style="height:20px;"></td></tr></table><div class="rireki-data">@@RIREKI_JSON_V1@@${payloadB64}@@END@@</div></div></div><script>function fit(){var p=document.querySelector('.page'),w=document.querySelector('.viewport');if(!p||!w)return;p.style.transform='';p.style.transformOrigin='top left';w.style.height='';var avail=w.clientWidth,pw=p.offsetWidth;if(avail<pw-1){var s=avail/pw;p.style.transform='scale('+s+')';w.style.height=(p.offsetHeight*s)+'px';}}window.addEventListener('load',fit);window.addEventListener('resize',fit);<\/script></body></html>`;
}

/* ---- プレビュー・翻訳・PDF ----------------------------------------------- */
function previewDirect(){
  const data=collectData();
  data.careers=data.careers.map(c=>({...c, statJa:residenceJa(c.statKey)}));
  pendingHtml=buildResumeHTML(data);
  showModal(data);
}
async function translateAndShowPDF(){
  const rawData=collectData();
  const overlay=document.getElementById('overlay');
  document.getElementById('overlay-msg').textContent=(T[currentLang]||T.ja).overlayMsg;
  overlay.classList.add('show');
  try{
    const translated=await translateFields(JSON.parse(JSON.stringify(rawData)),currentLang);
    pendingHtml=buildResumeHTML(translated);
    overlay.classList.remove('show');
    showModal(translated);
  }catch(e){
    // 想定外の例外でもフローを止めない：翻訳なしのデータでPDFを出す
    overlay.classList.remove('show');
    const fallback=collectData();
    fallback.careers=fallback.careers.map(c=>({...c, statJa:residenceJa(c.statKey)}));
    pendingHtml=buildResumeHTML(fallback);
    showModal(fallback);
  }
}
function showModal(data){
  const t=T[currentLang]||T.ja;
  document.getElementById('modal-desc').textContent=t.modalDesc;
  document.getElementById('modal-note').textContent=data&&data._translateNote?data._translateNote:'';
  const steps=document.getElementById('modal-steps-list');
  steps.innerHTML=`<li>${t.modalStep1}</li><li>${t.modalStep2}</li><li>${t.modalStep3}</li>`;
  const nm=data.name||'履歴書';
  document.getElementById('modal-open-btn').setAttribute('data-name',nm);
  document.getElementById('pdf-modal').classList.add('show');
}
function openPdfWindow(){
  document.getElementById('pdf-modal').classList.remove('show');
  const w=window.open('','_blank');
  if(w){
    w.document.write(pendingHtml);
    w.document.close();
  } else {
    const blob=new Blob([pendingHtml],{type:'text/html'});
    const url=URL.createObjectURL(blob);
    window.location.href=url;
  }
}
